apis:
  - aid: resurface:resurface-platform
    name: Resurface Platform
    description: >-
      Resurface captures complete API request and response data in real time,
      providing full-payload API call logging with no sampling. Security teams
      use it to detect threats, identify data leaks, and ensure compliance
      across all API traffic using a custom columnar database and SQL query interface.
    humanURL: https://resurface.io
    tags:
      - API Compliance
      - API Logging
      - API Observability
      - API Security
      - Runtime Security
      - Threat Detection
