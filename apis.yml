aid: resurface
name: Resurface
description: >-
  Resurface is an API runtime security platform that captures and analyzes
  complete API request and response payloads in real time. It provides full API
  call logging, threat detection, data leak prevention, and compliance auditing
  for API traffic without sampling or aggregation.
