aid: resurface
name: Resurface
description: >-
  Resurface (now Graylog API Security) is an API runtime security and observability
  platform that captures and analyzes complete API request and response payloads
  in real time. It provides full API call logging, threat detection, data leak
  prevention, and compliance auditing for API traffic without sampling or aggregation.
  Acquired by Graylog and integrated into the Graylog SIEM platform.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - API Analytics
  - API Compliance
  - API Logging
  - API Observability
  - API Security
  - Data Leak Prevention
  - Runtime Security
  - SIEM
  - Threat Detection
url: >-
